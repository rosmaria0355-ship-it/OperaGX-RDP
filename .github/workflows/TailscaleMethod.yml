name: RDP + Tailscale (Cleaned & Minimal)

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:         { description: "Tailscale tailnet (e.g. you@gmail.com)", required: true }
      ts_authkey:         { description: "Tailscale Auth key", required: true }
      ts_api_key:         { description: "Tailscale API key", required: true }
      runtime_minutes:    { description: "Runtime (max 360)", required: false, default: "355" }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 370
    env:
      RDP_USER: "user"
      RDP_PASS: "Pass1234"

    steps:
      - name: Force Hardware Portrait Display Resolution for Mobile
        run: |
          Write-Host "Injecting explicit vertical dimension constraints into RDP layer..."
          $RdpPath = "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp"
          New-ItemProperty -Path $RdpPath -Name "DefaultTargetWidth" -PropertyType DWord -Value 1080 -Force -ErrorAction SilentlyContinue
          New-ItemProperty -Path $RdpPath -Name "DefaultTargetHeight" -PropertyType DWord -Value 1920 -Force -ErrorAction SilentlyContinue
          
          # Force the display resolution subsystem layout
          Set-DisplayResolution -Width 1080 -Height 1920 -Force -ErrorAction SilentlyContinue

      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Write-Host "Fetching consumer-stable Opera GX Core..."
          $url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          
          Start-Process -FilePath $installer -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0", "--desktopshortcut=1" -Wait
          
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          if (Test-Path "$userDesktop\Opera GX.lnk") {
